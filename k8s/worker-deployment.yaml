apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
      - name: worker-container
        image: taskpulse-worker-service:latest
        imagePullPolicy: Never
        env:
        - name: REDIS_URL
          value: "redis://redis:6379" 