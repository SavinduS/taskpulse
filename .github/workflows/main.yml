name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install API Dependencies
        run: cd api-service && npm install

      - name: Docker Build API
        run: docker build -t api-service ./api-service

      - name: Docker Build Worker
        run: docker build -t worker-service ./worker-service
