services:
  
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  
  api-service:
    build: ./api-service
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
  
  worker-service:
    build: ./worker-service
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis